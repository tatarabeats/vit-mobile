name: Build Release AAB

# Play Console 提出用 AAB ビルド。手動トリガーのみ。
# 必要な GitHub Secrets:
#   KEYSTORE_BASE64    -- release.keystore を base64 エンコードしたもの
#   KEYSTORE_PASSWORD  -- keystore のパスワード
#   KEY_ALIAS          -- 鍵エイリアス
#   KEY_PASSWORD       -- 鍵のパスワード
# 未設定の場合は失敗する（debug 署名で Play Console に出すのは禁止）。

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify required secrets
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set. Generate a release keystore locally and register it as a GitHub Secret."
            exit 1
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.5"

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.5

      - name: Build release AAB
        env:
          STORE_FILE: ../release.keystore
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon

      - name: Rename AAB
        run: |
          mkdir -p dist
          cp app/build/outputs/bundle/release/app-release.aab dist/vit-mobile-release.aab

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: vit-mobile-aab
          path: dist/*.aab
          retention-days: 90

      - name: Cleanup keystore
        if: always()
        run: rm -f release.keystore
